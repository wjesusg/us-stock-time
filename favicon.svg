<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">US Stock Time icon</title>
  <desc id="desc">A quiet Apple-style silver glass icon for US Stock Time.</desc>
  <defs>
    <linearGradient id="base" x1="145" y1="79" x2="880" y2="951" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F9FAFB"/>
      <stop offset="0.34" stop-color="#DDE1E7"/>
      <stop offset="0.74" stop-color="#A8AFB9"/>
      <stop offset="1" stop-color="#6F7783"/>
    </linearGradient>
    <linearGradient id="glass" x1="238" y1="174" x2="786" y2="850" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="ink" x1="375" y1="278" x2="649" y2="715" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2C2D31"/>
      <stop offset="1" stop-color="#090A0B"/>
    </linearGradient>
    <linearGradient id="clock" x1="664" y1="222" x2="832" y2="402" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4A4D53"/>
      <stop offset="1" stop-color="#151619"/>
    </linearGradient>
    <filter id="outerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="34" flood-color="#3A3E46" flood-opacity="0.28"/>
    </filter>
    <filter id="softText" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <clipPath id="iconShape">
      <rect width="1024" height="1024" rx="232"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#base)"/>

  <g clip-path="url(#iconShape)">
  <g transform="translate(512 512) scale(1.14) translate(-512 -512)">
  <path d="M151 287C250 170 375 117 512 117c151 0 279 63 365 170" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" opacity="0.58"/>
  <path d="M151 737c96 106 218 159 361 159 145 0 271-57 361-159" fill="none" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round" opacity="0.36"/>

  <g filter="url(#outerShadow)">
    <rect x="168" y="168" width="688" height="688" rx="172" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.64" stroke-width="3"/>
    <path d="M217 313c87-78 181-116 295-116s209 38 295 116" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.58"/>
    <path d="M230 706c83 75 176 112 282 112s199-37 282-112" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  </g>

  <g opacity="0.14">
    <path d="M271 679h482" fill="none" stroke="#0F1012" stroke-width="18" stroke-linecap="round"/>
    <path d="M323 679V620M423 679V562M523 679V603M623 679V530M723 679V588" fill="none" stroke="#0F1012" stroke-width="21" stroke-linecap="round"/>
    <path d="M305 574l91-82 86 43 99-120 77 68 76-91" fill="none" stroke="#0F1012" stroke-width="23" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#softText)">
    <text x="512" y="437" text-anchor="middle"
      font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, Helvetica Neue, Arial, sans-serif"
      font-size="190" font-weight="860" letter-spacing="0" fill="url(#ink)">US</text>
    <text x="512" y="548" text-anchor="middle"
      font-family="-apple-system, BlinkMacSystemFont, SF Pro Display, Helvetica Neue, Arial, sans-serif"
      font-size="60" font-weight="780" letter-spacing="0" fill="#202226">Stock Time</text>
  </g>

  <rect x="340" y="622" width="344" height="86" rx="43" fill="#111214" opacity="0.92"/>
  <text x="512" y="678" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, Helvetica Neue, Arial, sans-serif"
    font-size="34" font-weight="760" letter-spacing="0" fill="#F7F8FA">NYSE / NASDAQ</text>

  <g transform="translate(668 214)">
    <circle cx="84" cy="84" r="78" fill="url(#clock)"/>
    <circle cx="84" cy="84" r="76" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="3"/>
    <path d="M84 39v47l34 25" fill="none" stroke="#F8F9FA" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M48 43a67 67 0 0 1 72 0" fill="none" stroke="#C7CCD4" stroke-width="10" stroke-linecap="round"/>
  </g>
  </g>
  </g>
</svg>
